# ---------------------------------------------------------------------------
# Vessel trackball — ZMK config (XIAO nRF52840 Sense Plus)
# ---------------------------------------------------------------------------

# --- Bluetooth ---
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y          # a little more range

# --- Power / sleep (big battery win) ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000   # deep sleep after 30 min idle

# --- Pointing subsystem: trackball movement + mouse buttons + scroll ---
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y

# --- PMW3610 trackball driver (badjeff module) ---
CONFIG_PMW3610_ALT=y
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12   # optional: tune wireless report rate

# --- Optional WS2812 underglow indicator (uses its own SPI/pin — off by default) ---
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# --- Debug over USB while bringing it up (comment out for release) ---
# CONFIG_ZMK_USB_LOGGING=y
